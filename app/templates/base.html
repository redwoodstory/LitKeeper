<!DOCTYPE html>
<html lang="en" class="{% block html_class %}h-full{% endblock %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function() {
      var pref = localStorage.getItem('litkeeper_theme');
      if (pref === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (pref === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme',
          window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      }
    })();
  </script>

  <title>{% block title %}LitKeeper{% endblock %}</title>

  {% block meta_tags %}
  <meta name="description" content="Download and read stories from Literotica in EPUB and HTML formats">
  <meta name="theme-color" content="#4a90e2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LitKeeper">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="preload" href="/static/fonts/PlayfairDisplay-Regular.ttf" as="font" type="font/ttf" crossorigin="anonymous">
  {% endblock %}

  {% block stylesheets %}
  <script src="/static/vendor/htmx.min.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
  <script src="/static/vendor/tailwind.js"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            primary: '#4a90e2',
            'primary-dark': '#357abd',
          },
          fontFamily: {
            playfair: ['Playfair Display', 'Georgia', 'serif'],
          },
        }
      },
      safelist: [
        'ring-slate-900/10',
        'ring-slate-900/20',
        'ring-white/10',
        'ring-white/20',
        'bg-slate-100',
        'bg-slate-200',
        'bg-slate-800',
        'bg-slate-700',
        'text-slate-700',
        'text-slate-300',
        'rounded-full',
        'px-3',
        'py-1.5',
      ]
    }
  </script>

  <style type="text/tailwindcss">
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 400;
      src: url('/static/fonts/PlayfairDisplay-Regular.ttf') format('truetype');
      font-display: block;
    }

    @layer components {
      .btn-primary {
        @apply bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed;
      }
      .card {
        @apply bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6;
      }
    }

    @layer base {
      * {
        --tw-ring-offset-width: 0px;
        --tw-ring-offset-color: #fff;
        --tw-ring-color: rgb(59 130 246 / 0.5);
        --tw-ring-offset-shadow: 0 0 #0000;
        --tw-ring-shadow: 0 0 #0000;
      }
    }

    @layer base {
      select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 0.5rem center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
        appearance: none;
      }

      [data-theme="dark"] select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      }
    }

    @layer utilities {
      .ring-1 {
        --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
        --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(1px + var(--tw-ring-offset-width)) var(--tw-ring-color);
        box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000);
      }

      .ring-slate-900\/10 {
        --tw-ring-color: rgb(15 23 42 / 0.1);
      }

      .ring-slate-900\/20 {
        --tw-ring-color: rgb(15 23 42 / 0.2);
      }

      .ring-white\/10 {
        --tw-ring-color: rgb(255 255 255 / 0.1);
      }

      .ring-white\/20 {
        --tw-ring-color: rgb(255 255 255 / 0.2);
      }

      .htmx-indicator {
        display: none;
      }

      .htmx-request .htmx-indicator {
        display: inline;
      }

      .htmx-request .htmx-not-indicator {
        display: none;
      }

      .htmx-request.htmx-indicator {
        display: inline;
      }
    }
  </style>
  {% endblock %}

  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-gray-50 dark:bg-gray-900 transition-colors h-full{% endblock %}" hx-boost="true">
  {% block theme_toggle %}
  <div class="fixed top-4 right-4 z-50">
    <a href="/settings"
       hx-boost="false"
       class="p-3 rounded-full bg-white dark:bg-gray-800 shadow-lg hover:scale-110 transition-transform block"
       aria-label="Settings">
      <svg class="w-6 h-6 text-gray-800 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
    </a>
  </div>
  {% endblock %}

  {% block content %}{% endblock %}

  {% block scripts %}
  <script src="/static/js/theme.js" defer></script>
  {% endblock %}

  {% if pin_enabled %}
  <script>
    (function () {
      // Threshold in ms before locking. For 'when backgrounded' (timeout=0) we use
      // 2 seconds so that normal page navigations (which briefly hide the page but
      // resolve in <500 ms) never trigger a lock.
      var lockMs = {{ auto_lock_timeout }} > 0 ? {{ auto_lock_timeout }} * 60000 : 2000;
      var hiddenAt = 0;

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') {
          if (!window.location.pathname.startsWith('/auth/')) {
            hiddenAt = Date.now();
          }
        } else if (document.visibilityState === 'visible') {
          if (!window.location.pathname.startsWith('/auth/') && hiddenAt > 0) {
            var elapsed = Date.now() - hiddenAt;
            hiddenAt = 0;
            if (elapsed >= lockMs) {
              navigator.sendBeacon('/auth/lock-now');
              window.location.replace('/auth/lock');
            }
          } else {
            hiddenAt = 0;
          }
        }
      });
    })();
  </script>
  {% endif %}
</body>
</html>
