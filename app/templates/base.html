<!DOCTYPE html>
<html lang="en" class="{% block html_class %}h-full{% endblock %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}LitKeeper{% endblock %}</title>

  {% block meta_tags %}
  <meta name="description" content="Download and read stories from Literotica in EPUB and HTML formats">
  <meta name="theme-color" content="#4a90e2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LitKeeper">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  {% endblock %}

  {% block stylesheets %}
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4a90e2',
            'primary-dark': '#357abd',
          }
        }
      },
      safelist: [
        'ring-slate-900/10',
        'ring-slate-900/20',
        'ring-white/10',
        'ring-white/20',
        'bg-slate-100',
        'bg-slate-200',
        'bg-slate-800',
        'bg-slate-700',
        'text-slate-700',
        'text-slate-300',
        'rounded-full',
        'px-3',
        'py-1.5',
      ]
    }
  </script>

  <style type="text/tailwindcss">
    @layer components {
      .btn-primary {
        @apply bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed;
      }
      .card {
        @apply bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6;
      }
    }

    @layer base {
      * {
        --tw-ring-offset-width: 0px;
        --tw-ring-offset-color: #fff;
        --tw-ring-color: rgb(59 130 246 / 0.5);
        --tw-ring-offset-shadow: 0 0 #0000;
        --tw-ring-shadow: 0 0 #0000;
      }
    }

    @layer utilities {
      .ring-1 {
        --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
        --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(1px + var(--tw-ring-offset-width)) var(--tw-ring-color);
        box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000);
      }

      .ring-slate-900\/10 {
        --tw-ring-color: rgb(15 23 42 / 0.1);
      }

      .ring-slate-900\/20 {
        --tw-ring-color: rgb(15 23 42 / 0.2);
      }

      .ring-white\/10 {
        --tw-ring-color: rgb(255 255 255 / 0.1);
      }

      .ring-white\/20 {
        --tw-ring-color: rgb(255 255 255 / 0.2);
      }
    }
  </style>
  {% endblock %}

  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-gray-50 dark:bg-gray-900 transition-colors h-full{% endblock %}">
  {% block theme_toggle %}
  <div class="fixed top-4 right-4 z-50 flex gap-2">
    <button id="themeToggle"
            class="p-3 rounded-full bg-white dark:bg-gray-800 shadow-lg hover:scale-110 transition-transform"
            aria-label="Toggle theme">
      <svg class="w-6 h-6 hidden dark:block text-gray-800 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
      </svg>
      <svg class="w-6 h-6 block dark:hidden text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
      </svg>
    </button>
    <a href="/settings"
       class="p-3 rounded-full bg-white dark:bg-gray-800 shadow-lg hover:scale-110 transition-transform"
       aria-label="Settings">
      <svg class="w-6 h-6 text-gray-800 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
    </a>
  </div>
  {% endblock %}

  {% block content %}{% endblock %}

  {% block scripts %}
  <script src="/static/js/theme.js" defer></script>
  {% endblock %}
</body>
</html>
