<div id="metadataUpdateBanner" class="hidden mb-6 rounded-lg p-6 transition-all duration-300">
  <div class="flex items-start gap-4">
    <div id="metadataUpdateIcon"></div>
    <div class="flex-1">
      <h3 id="metadataUpdateTitle" class="font-semibold mb-2"></h3>
      <p id="metadataUpdateMessage" class="text-sm"></p>
    </div>
  </div>
</div>

<div id="missingMetadataBanner" class="hidden mb-6 bg-amber-50 dark:bg-amber-900/20 border-l-4 border-amber-400 dark:border-amber-600 rounded-lg p-6">
  <div class="flex items-start gap-4">
    <svg class="w-6 h-6 text-amber-600 dark:text-amber-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <div class="flex-1">
      <h3 class="font-semibold text-amber-900 dark:text-amber-200 mb-2">
        Stories Missing Metadata
      </h3>
      <p id="missingMetadataMessage" class="text-sm text-amber-800 dark:text-amber-300 mb-4">
        <span id="missingMetadataCount">0</span> stories are missing Literotica metadata. Click on a story below to find and link it.
      </p>
      
      <details class="text-sm">
        <summary class="cursor-pointer font-medium text-amber-900 dark:text-amber-200 hover:text-amber-700 dark:hover:text-amber-100 mb-3">
          View stories (<span id="missingMetadataCountDetail">0</span>)
        </summary>
        <div id="missingMetadataList" class="mt-3 space-y-2 max-h-96 overflow-y-auto">
        </div>
      </details>
    </div>
    <button onclick="dismissMissingMetadataBanner()" class="text-amber-600 dark:text-amber-500 hover:text-amber-800 dark:hover:text-amber-300 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</div>

<script>
let missingStoriesCache = [];

async function loadMissingMetadata() {
  try {
    const response = await fetch('/api/metadata/missing');
    const data = await response.json();

    const banner = document.getElementById('missingMetadataBanner');
    
    if (data.success && data.count > 0) {
      sessionStorage.removeItem('missingMetadataBannerDismissed');
      missingStoriesCache = data.stories;
      renderMissingMetadataList();
      banner.classList.remove('hidden');
    } else if (data.success && data.count === 0) {
      sessionStorage.removeItem('missingMetadataBannerDismissed');
      missingStoriesCache = [];
      banner.classList.add('hidden');
    }
  } catch (error) {
    console.error('Error loading missing metadata:', error);
  }
}

function renderMissingMetadataList() {
  const countSpan = document.getElementById('missingMetadataCount');
  const countDetailSpan = document.getElementById('missingMetadataCountDetail');
  const listDiv = document.getElementById('missingMetadataList');

  countSpan.textContent = missingStoriesCache.length;
  countDetailSpan.textContent = missingStoriesCache.length;

  listDiv.innerHTML = missingStoriesCache.map(story => `
    <button onclick="openRefreshModalFromBanner(${story.id}, '${escapeHtml(story.title).replace(/'/g, "\\'")}', '${escapeHtml(story.author).replace(/'/g, "\\'")}')"
            class="w-full text-left p-3 bg-white dark:bg-amber-900/30 border border-amber-200 dark:border-amber-700 rounded-lg hover:bg-amber-50 dark:hover:bg-amber-900/40 transition-all duration-200">
      <div class="font-medium text-amber-900 dark:text-amber-100">${escapeHtml(story.title)}</div>
      <div class="text-sm text-amber-700 dark:text-amber-300 mt-1">by ${escapeHtml(story.author)}</div>
    </button>
  `).join('');
}

function openRefreshModalFromBanner(storyId, title, author) {
  console.log('openRefreshModalFromBanner called with:', storyId, title, author);
  
  missingStoriesCache = missingStoriesCache.filter(story => story.id !== storyId);
  
  if (missingStoriesCache.length === 0) {
    const banner = document.getElementById('missingMetadataBanner');
    banner.classList.add('hidden');
  } else {
    renderMissingMetadataList();
  }
  
  showMetadataUpdateBanner(title);
  
  if (typeof openRefreshModal === 'function') {
    openRefreshModal(storyId, title, author, async (fieldsChanged) => {
      if (fieldsChanged) {
        showMetadataSuccessBanner(title, fieldsChanged);
      } else {
        hideMetadataUpdateBanner();
      }
      await loadMissingMetadata();
    });
  } else {
    console.error('openRefreshModal function not found');
  }
}

function showMetadataUpdateBanner(title) {
  const banner = document.getElementById('metadataUpdateBanner');
  const icon = document.getElementById('metadataUpdateIcon');
  const titleEl = document.getElementById('metadataUpdateTitle');
  const messageEl = document.getElementById('metadataUpdateMessage');
  
  banner.className = 'mb-6 bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-400 dark:border-blue-600 rounded-lg p-6 transition-all duration-300';
  
  icon.innerHTML = `
    <svg class="w-6 h-6 text-blue-600 dark:text-blue-400 flex-shrink-0 mt-0.5 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  `;
  
  titleEl.className = 'font-semibold text-blue-900 dark:text-blue-200 mb-2';
  titleEl.textContent = 'Updating Metadata';
  
  messageEl.className = 'text-sm text-blue-800 dark:text-blue-300';
  messageEl.innerHTML = `Updating metadata for <span class="font-medium">${escapeHtml(title)}</span>...`;
  
  banner.classList.remove('hidden');
}

function showMetadataSuccessBanner(title, fieldsChanged) {
  const banner = document.getElementById('metadataUpdateBanner');
  const icon = document.getElementById('metadataUpdateIcon');
  const titleEl = document.getElementById('metadataUpdateTitle');
  const messageEl = document.getElementById('metadataUpdateMessage');
  
  banner.className = 'mb-6 bg-green-50 dark:bg-green-900/20 border-l-4 border-green-400 dark:border-green-600 rounded-lg p-6 transition-all duration-300';
  
  icon.innerHTML = `
    <svg class="w-6 h-6 text-green-600 dark:text-green-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
  `;
  
  titleEl.className = 'font-semibold text-green-900 dark:text-green-200 mb-2';
  titleEl.textContent = 'Metadata Updated Successfully';
  
  messageEl.className = 'text-sm text-green-800 dark:text-green-300';
  messageEl.innerHTML = `Successfully updated metadata for <span class="font-medium">${escapeHtml(title)}</span>`;
  
  setTimeout(() => {
    banner.classList.add('hidden');
  }, 3000);
}

function hideMetadataUpdateBanner() {
  const banner = document.getElementById('metadataUpdateBanner');
  banner.classList.add('hidden');
}

function dismissMissingMetadataBanner() {
  sessionStorage.setItem('missingMetadataBannerDismissed', 'true');
  const banner = document.getElementById('missingMetadataBanner');
  if (banner) {
    banner.classList.add('hidden');
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadMissingMetadata);
} else {
  loadMissingMetadata();
}
</script>
