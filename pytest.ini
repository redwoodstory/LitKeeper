[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short

markers =
    unit: Fast unit tests (no external dependencies)
    integration: Integration tests (Flask test client)
    e2e: End-to-end tests with real HTTP requests (slow)
    security: Security and penetration tests
    slow: Slow-running tests (real downloads, rate limiting)

filterwarnings =
    error
    ignore::DeprecationWarning:ebooklib
    ignore::DeprecationWarning:apprise
    ignore::UserWarning:ebooklib
    ignore::FutureWarning:ebooklib
    ignore::ResourceWarning
    ignore::pytest.PytestUnraisableExceptionWarning

[coverage:run]
source = app
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*
    .venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
